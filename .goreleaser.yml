# goreleaser config for rein.
#
# Wrangle's Go build type wraps goreleaser; it does not replace it.
# This file is the minimum needed for a SLSA L3 release. See
# https://goreleaser.com/customization/ for the full set of options.
#
# Reproducibility flags (-trimpath, -buildvcs=false) are the wrangle Go
# build type's recommended baseline; they ensure builds match SLSA
# provenance verification.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: rein
    main: ./cmd/rein
    binary: rein
    env:
      # CGO_ENABLED=0: rein has no cgo dependencies in Phase 0 / 0.5.
      # Phase 1+'s sks integration (facebookincubator/sks for hardware-
      # backed key custody) will require cgo on AND a cross-compile
      # toolchain (zig is the recommended path — see issue #17). Flip
      # this back to 1 at that point and add the per-target CC overrides.
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    # files: README.md + LICENSE were here, but neither exists yet —
    # README is CP7's deliverable in PLAN-0.5.md; LICENSE is a
    # project-level decision still pending. Re-add when both land.

checksum:
  # Wrangle pins this filename for the SLSA verify step
  name_template: 'checksums.txt'

snapshot:
  # ShortCommit-based template has no semver dependency. The
  # incpatch-based form (still documented in goreleaser examples)
  # requires .Version to parse as semver, which it won't until the
  # repo has a v* tag in history (#16). Also note that goreleaser v2
  # renamed snapshot.name_template → snapshot.version_template.
  version_template: '{{ .ShortCommit }}-snapshot'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
