# Build and publish rein via wrangle's Go build type.
#
# Calls TomHennen/wrangle's reusable Go workflow (v0.3.0) for:
#   - Source-stage checks (gofmt, go vet, go test -race, govulncheck) on
#     every push/PR
#   - Source scan (osv + wrangle-lint block publish on findings; zizmor and
#     scorecard informational) — see scan-tools below for the private-repo
#     adjustments (zizmor :info, dependency-review omitted)
#   - Release: goreleaser publish + SPDX SBOM + SLSA L3 provenance on tag
#     push
#   - Attest + verify: GitHub-issued provenance and a signed SLSA VSA per
#     artifact, verified fail-closed (against the `policy:` below) before the
#     VSA is attached
#
# Adopting wrangle's reusable workflow means rein gets supply-chain hygiene
# from commit one. See https://github.com/TomHennen/wrangle for the design.
#
# !!! KNOWN BLOCKER — the release path cannot complete on this repo today !!!
# rein is a USER-OWNED PRIVATE repo. wrangle's `attest` job calls GitHub's
# actions/attest-build-provenance, which persists to GitHub's attestation
# store — a feature NOT available for user-owned private repos. A tag push
# therefore fails at `attest` with:
#   "Failed to persist attestation: Feature not available for user-owned
#    private repositories."
# and `verify` (the policy gate) is skipped. There is NO wrangle input to
# disable attestation persistence (checked all v0.3.0 inputs). The only fixes
# are: move rein under an org (with a plan that allows private attestations),
# or make it public. Until then, on-tag release/attest/verify is non-functional;
# PR-time checks + scan still work, which is what CI exercises today.
# Observed 2026-06-22 on tag v0.0.0-frictiontest (run 27946267499, since deleted).
#
# v0.3.0 upgrade note: v0.3.0 added the `policy:` input (see below) and
# defaults it to wrangle-default-go-v1, which is STRICTER than v0.2.x's
# hard-wired provenance-only verification — it additionally requires an SBOM
# and clean osv/zizmor/wrangle-lint scan attestations. We keep the default;
# see the scan-tools note for the zizmor:info interaction.
#
# Pin discipline: the `uses:` ref below pins wrangle's *release tag*
# (`@vX.Y.Z`) with an inline zizmor exception. This is wrangle's recommended
# form for its own reusable workflows (see wrangle's docs/FAQ.md):
#   - wrangle's release tags are immutable — a published vX.Y.Z is locked to
#     its commit and can't be moved or deleted — so a tag pin carries the same
#     integrity as a SHA, but stays legible (you see the version).
#   - The tag's keyless-VSA verify identity (`@refs/tags/vX.Y.Z`) is the one
#     wrangle's documented `cosign` command expects by default, so rein's
#     downstream consumers verify unedited.
#   - The `# zizmor: ignore[unpinned-uses]` is required only because wrangle's
#     bundled zizmor scan flags any tag-pinned `uses:` and can't tell the tag
#     is immutable. It scopes the exception to this one line; every OTHER
#     action rein uses still pins by SHA.
# Dependabot bumps this tag forward only to published releases, on a cooldown,
# with no auto-merge (.github/dependabot.yml). Never use a branch ref (`@main`).
# A SHA pin (`@<sha> # vX.Y.Z`, no ignore needed) is equally valid per the FAQ;
# we pick the tag for legibility and the out-of-the-box verify identity.

name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write         # release job publishes on tag push; verify attaches the VSA
      id-token: write         # OIDC for Sigstore keyless signing
      attestations: write     # attest job writes GitHub-issued SLSA provenance
      actions: read           # source scan: Scorecard reads the Actions API; SLSA generator inspects the run
      security-events: write  # source-scan SARIF -> Security tab (uploads are best-effort; no-op without Advanced Security)
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.3.0 # zizmor: ignore[unpinned-uses] - immutable
    with:
      # Path to the Go module (default '.' is fine; rein lives at repo root)
      path: '.'
      # Source-scan tools. wrangle's default is
      # "osv zizmor scorecard:info dependency-review wrangle-lint". Two
      # adjustments, both forced by rein being a PRIVATE repo without GitHub
      # Advanced Security (no code scanning):
      #   - dependency-review DROPPED: it calls GitHub's dependency-graph
      #     compare API, which 403s without GHAS — a blocking run would redden
      #     every PR-to-main. It is NOT required by the default policy below, so
      #     dropping it needs no policy change.
      #   - zizmor set to :info (non-blocking): wrangle's zizmor tool hardcodes
      #     advanced-security: true, which uploads SARIF to code scanning. That
      #     upload hard-fails here ("Code scanning is not enabled for this
      #     repository") — still observed under v0.3.0.
      #     HISTORICAL REASON, NOW OBSOLETE: under v0.2.x wrangle treated that
      #     failed upload as a tool error (collect_sarif.sh tested src_count
      #     <= 0), so a :fail zizmor could never go green. v0.3.0 changed the
      #     test to src_count < 0 — a clean SARIF whose upload fails is no
      #     longer a tool error — and the scan job now passes with the upload
      #     failing (observed: PR #27 run 27945693540, scan job green).
      #   TODO: zizmor:info is now likely promotable to :fail on this repo even
      #   without GHAS. Left at :info conservatively because the verify/policy
      #   path can't be exercised yet (attest blocker above), so the :fail
      #   behavior at verify time is unconfirmed. Promote + confirm once the
      #   repo can release (org-owned or public).
      #
      # Policy interaction (v0.3.0): the default policy wrangle-default-go-v1
      # requires a CLEAN osv/zizmor/wrangle-lint scan ATTESTATION. The scan
      # attestation is written from the SARIF regardless of :info/:fail (the
      # suffix only governs the build-time gate), so a clean zizmor audit
      # satisfies the policy even at :info. :info only fails to protect the
      # release if zizmor genuinely ERRORS — then the build stays green but
      # verify would fail closed on the missing/findings attestation.
      scan-tools: "osv zizmor:info scorecard:info wrangle-lint"
      # policy: left at the default (wrangle-default-go-v1). v0.2.x hard-wired
      # provenance-only; v0.3.0's default additionally requires SBOM + clean
      # osv/zizmor/wrangle-lint attestations. rein runs all three, so the
      # default is satisfiable on the happy path; see the scan-tools note for
      # the zizmor:info caveat.
      # release-events defaults to tag-only — the cheapest setting and the
      # one that matches rein's "publish only on v* tags" model.
      #
      # run-race-detector is left at its true default: the `checks` job runs
      # `go test -race` on a runner where CGO is available, and rein's tests
      # are pure Go. (The CGO_ENABLED=0 in .goreleaser.yml scopes only the
      # release build, not the test job.)
