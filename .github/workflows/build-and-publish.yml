# Build and publish rein via wrangle's Go build type.
#
# Calls TomHennen/wrangle's reusable Go workflow (v0.4.0) for:
#   - Source-stage checks (gofmt, go vet, go test -race, govulncheck) on
#     every push/PR
#   - Source scan (osv, zizmor, and wrangle-lint block publish on findings;
#     scorecard informational) — see scan-tools below for the one private-repo
#     adjustment (dependency-review omitted)
#   - Release: goreleaser + SPDX SBOM, published on tag push
#
# Adopting wrangle's reusable workflow means rein gets supply-chain hygiene
# from commit one. See https://github.com/TomHennen/wrangle for the design.
#
# NOT attested, for now. `attest-and-verify: disabled` below turns off the
# SLSA provenance + signed VSA that wrangle would otherwise produce, because a
# private repo cannot attest — see the input's comment for why and for the
# conditions that turn it back on. docs/design.md describes the attested end
# state; that remains the target, and this is the temporary deviation from it.
#
# Pin discipline: the `uses:` ref below pins wrangle's *release tag*
# (`@vX.Y.Z`) with an inline zizmor exception. This is wrangle's recommended
# form for its own reusable workflows (see wrangle's docs/FAQ.md):
#   - wrangle's release tags are immutable — a published vX.Y.Z is locked to
#     its commit and can't be moved or deleted — so a tag pin carries the same
#     integrity as a SHA, but stays legible (you see the version).
#   - The tag's keyless-VSA verify identity (`@refs/tags/vX.Y.Z`) is the one
#     wrangle's documented `cosign` command expects by default, so once rein
#     attests again its downstream consumers verify unedited.
#   - The `# zizmor: ignore[unpinned-uses]` is required only because wrangle's
#     bundled zizmor scan flags any tag-pinned `uses:` and can't tell the tag
#     is immutable. It scopes the exception to this one line; every OTHER
#     action rein uses still pins by SHA.
# Dependabot bumps this tag forward only to published releases, on a cooldown,
# with no auto-merge (.github/dependabot.yml). Never use a branch ref (`@main`).
# A SHA pin (`@<sha> # vX.Y.Z`, no ignore needed) is equally valid per the FAQ;
# we pick the tag for legibility and the out-of-the-box verify identity.

name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write         # release job publishes on tag push
      id-token: write         # OIDC for Sigstore keyless signing (scorecard; attest/verify when re-enabled)
      attestations: write     # attest job writes GitHub-issued SLSA provenance (skipped while unattested)
      actions: read           # source scan: Scorecard reads the Actions API; SLSA generator inspects the run
      security-events: write  # source-scan SARIF -> Security tab (uploads are best-effort; no-op without Advanced Security)
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.4.0 # zizmor: ignore[unpinned-uses] - immutable
    with:
      # Path to the Go module (default '.' is fine; rein lives at repo root)
      path: '.'
      # Publish the release UNATTESTED: no SLSA provenance, no signed VSA.
      # Tests, scans, and the SBOM still gate it; the release is marked
      # unattested. This is not a preference — a private repo cannot attest:
      # GitHub's attestation store doesn't support a private personal repo at
      # all, and keyless signing would publish rein's identity and build timing
      # to the public Rekor transparency log. wrangle v0.4.0 fails the run fast
      # (in `prep`) if we leave this `enabled` on a private repo, so the choice
      # is unattested releases or no releases.
      #
      # Flip back to `enabled` — and delete this comment — the moment rein goes
      # public, or when wrangle ships private-repo attestation
      # (TomHennen/wrangle#600). Note wrangle's rule: pick one mode per tag;
      # switching an existing release between attested and unattested is
      # unsupported, so re-enabling applies to the NEXT tag. rein has published
      # no v* release yet, so nothing shipped is affected today.
      attest-and-verify: disabled
      # wrangle's default scan-tools, minus dependency-review — the one tool a
      # private repo can't run. It needs the dependency-graph API, which GitHub
      # exposes only with Advanced Security, so it hard-fails ("Dependency
      # review is not supported on this repository") and reddens every PR;
      # tested on this branch, not assumed. Deleting this line to take the
      # default is exactly what #105 does once rein enables GHAS or goes public.
      # Everything else, including blocking zizmor, is wrangle's default.
      scan-tools: "osv zizmor scorecard:info wrangle-lint"
      # release-events defaults to tag-only — the cheapest setting and the
      # one that matches rein's "publish only on v* tags" model.
      #
      # run-race-detector is left at its true default: the `checks` job runs
      # `go test -race` on a runner where CGO is available, and rein's tests
      # are pure Go. (The CGO_ENABLED=0 in .goreleaser.yml scopes only the
      # release build, not the test job.)
