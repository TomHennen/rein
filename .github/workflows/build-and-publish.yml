# Build and publish rein via wrangle's Go build type: source checks + scan on
# every push/PR; goreleaser + SBOM + SLSA provenance + a signed VSA on v* tags.
# See https://github.com/TomHennen/wrangle for what each stage does.
#
# The `uses:` ref pins wrangle's release tag, not a SHA. wrangle's tags are
# immutable, so a tag pin carries the same integrity while staying legible, and
# `@refs/tags/vX.Y.Z` is the identity wrangle's documented cosign command
# expects — rein's consumers verify unedited. The inline zizmor exception is
# needed only because zizmor can't tell the tag is immutable; every other action
# rein uses still pins by SHA. Never use a branch ref (`@main`). Dependabot bumps
# this tag on a cooldown, no auto-merge (.github/dependabot.yml).

name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write         # release publishes on tag push; verify attaches the VSA
      id-token: write         # OIDC for Sigstore keyless signing
      attestations: write     # attest writes GitHub-issued SLSA provenance
      actions: read           # Scorecard reads the Actions API; SLSA generator inspects the run
      security-events: write  # scan SARIF -> Security tab
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.4.0 # zizmor: ignore[unpinned-uses] - immutable
    with:
      path: '.'
      # Everything else is wrangle's default. rein carried two overrides while
      # it was private (`attest-and-verify: disabled`, a trimmed `scan-tools`);
      # both are gone as of #114 and should not come back.
