# Build and publish rein via wrangle's Go build type.
#
# Calls TomHennen/wrangle's reusable Go workflow (v0.4.0) for:
#   - Source-stage checks (gofmt, go vet, go test -race, govulncheck) on
#     every push/PR
#   - Source scan (osv, zizmor, dependency-review, and wrangle-lint block
#     publish on findings; scorecard informational)
#   - Release: goreleaser + SPDX SBOM + SLSA L3 provenance on tag push
#   - Attest + verify: GitHub-issued provenance and a signed SLSA VSA per
#     artifact, verified fail-closed before the VSA is attached
#
# Adopting wrangle's reusable workflow means rein gets supply-chain hygiene
# from commit one. See https://github.com/TomHennen/wrangle for the design.
#
# Every input below is wrangle's default: rein is a PUBLIC repo, so it can
# attest, and nothing needs adjusting. (It couldn't while private — no
# attestation store, and dependency-review needs an Advanced Security API — so
# this file used to carry `attest-and-verify: disabled` and a trimmed
# `scan-tools`. Both are gone as of rein#107; don't reintroduce them.)
#
# Pin discipline: the `uses:` ref below pins wrangle's *release tag*
# (`@vX.Y.Z`) with an inline zizmor exception. This is wrangle's recommended
# form for its own reusable workflows (see wrangle's docs/FAQ.md):
#   - wrangle's release tags are immutable — a published vX.Y.Z is locked to
#     its commit and can't be moved or deleted — so a tag pin carries the same
#     integrity as a SHA, but stays legible (you see the version).
#   - The tag's keyless-VSA verify identity (`@refs/tags/vX.Y.Z`) is the one
#     wrangle's documented `cosign` command expects by default, so rein's
#     downstream consumers verify unedited.
#   - The `# zizmor: ignore[unpinned-uses]` is required only because wrangle's
#     bundled zizmor scan flags any tag-pinned `uses:` and can't tell the tag
#     is immutable. It scopes the exception to this one line; every OTHER
#     action rein uses still pins by SHA.
# Dependabot bumps this tag forward only to published releases, on a cooldown,
# with no auto-merge (.github/dependabot.yml). Never use a branch ref (`@main`).
# A SHA pin (`@<sha> # vX.Y.Z`, no ignore needed) is equally valid per the FAQ;
# we pick the tag for legibility and the out-of-the-box verify identity.

name: build-and-publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write         # release job publishes on tag push; verify attaches the VSA
      id-token: write         # OIDC for Sigstore keyless signing
      attestations: write     # attest job writes GitHub-issued SLSA provenance
      actions: read           # source scan: Scorecard reads the Actions API; SLSA generator inspects the run
      security-events: write  # source-scan SARIF -> Security tab
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.4.0 # zizmor: ignore[unpinned-uses] - immutable
    with:
      # Path to the Go module (default '.' is fine; rein lives at repo root)
      path: '.'
      # attest-and-verify defaults to `enabled`: SLSA provenance + a signed VSA
      # per artifact, verified fail-closed before publish. rein is public, so
      # this works — no input needed.
      #
      # scan-tools defaults to
      # "osv zizmor scorecard:info dependency-review wrangle-lint". All four
      # blocking tools run; no input needed.
      #
      # release-events defaults to tag-only — the cheapest setting and the
      # one that matches rein's "publish only on v* tags" model.
      #
      # run-race-detector is left at its true default: the `checks` job runs
      # `go test -race` on a runner where CGO is available, and rein's tests
      # are pure Go. (The CGO_ENABLED=0 in .goreleaser.yml scopes only the
      # release build, not the test job.)
